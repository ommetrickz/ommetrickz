<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #1a1f2e; stroke-width: 1; }
      .accent-line { stroke: #4f8ef7; stroke-width: 1.5; }
      .dot { fill: #4f8ef7; }
      .dot-dim { fill: #1e2a40; }

      .name {
        font-family: 'Space Mono', monospace;
        font-size: 46px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 3px;
      }
      .role {
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        font-weight: 400;
        fill: #7a8ba0;
        letter-spacing: 5px;
        text-transform: uppercase;
      }
      .tag {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        fill: #4f8ef7;
        letter-spacing: 2px;
      }
      .corner { fill: none; stroke: #4f8ef7; stroke-width: 1.5; }

      /* Scan line animation */
      .scanline {
        fill: none;
        stroke: #4f8ef7;
        stroke-width: 0.5;
        opacity: 0;
        animation: scan 4s ease-in-out infinite;
      }
      @keyframes scan {
        0%   { opacity: 0; transform: translateY(0px); }
        10%  { opacity: 0.3; }
        90%  { opacity: 0.3; }
        100% { opacity: 0; transform: translateY(180px); }
      }

      /* Name fade in */
      .name { opacity: 0; animation: fadeUp 0.8s ease forwards 0.3s; }
      .role { opacity: 0; animation: fadeUp 0.8s ease forwards 0.9s; }
      .tag  { opacity: 0; animation: fadeUp 0.8s ease forwards 1.4s; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Blink cursor */
      .cursor {
        fill: #4f8ef7;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Pulse dot */
      .pulse {
        fill: #4f8ef7;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { r: 3; opacity: 1; }
        50%       { r: 5; opacity: 0.4; }
      }

      /* Shimmer accent line */
      .shimmer-line {
        stroke: #4f8ef7;
        stroke-width: 2;
        opacity: 0;
        animation: shimmer 3s ease-in-out infinite 1.8s;
      }
      @keyframes shimmer {
        0%   { opacity: 0; stroke-dashoffset: 300; }
        30%  { opacity: 1; }
        70%  { opacity: 1; }
        100% { opacity: 0; stroke-dashoffset: 0; }
      }
    </style>

    <!-- Noise/grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" class="bg"/>

  <!-- Subtle grain overlay -->
  <rect width="900" height="220" fill="#0d1117" filter="url(#grain)" opacity="0.15"/>

  <!-- Grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
  <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
  <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
  <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
  <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
  <line x1="150" y1="0" x2="150" y2="220" class="grid-line"/>
  <line x1="300" y1="0" x2="300" y2="220" class="grid-line"/>
  <line x1="600" y1="0" x2="600" y2="220" class="grid-line"/>
  <line x1="750" y1="0" x2="750" y2="220" class="grid-line"/>

  <!-- Accent: left bracket corner -->
  <polyline points="30,30 30,50 50,50" class="corner"/>
  <polyline points="30,190 30,170 50,170" class="corner"/>

  <!-- Accent: right bracket corner -->
  <polyline points="870,30 870,50 850,50" class="corner"/>
  <polyline points="870,190 870,170 850,170" class="corner"/>

  <!-- Dot grid (right side decoration) -->
  <circle cx="680" cy="60"  r="2" class="dot-dim"/>
  <circle cx="700" cy="60"  r="2" class="dot-dim"/>
  <circle cx="720" cy="60"  r="2" class="dot-dim"/>
  <circle cx="740" cy="60"  r="2" class="dot-dim"/>
  <circle cx="680" cy="80"  r="2" class="dot-dim"/>
  <circle cx="700" cy="80"  r="2" class="dot"/>
  <circle cx="720" cy="80"  r="2" class="dot-dim"/>
  <circle cx="740" cy="80"  r="2" class="dot-dim"/>
  <circle cx="680" cy="100" r="2" class="dot-dim"/>
  <circle cx="700" cy="100" r="2" class="dot-dim"/>
  <circle cx="720" cy="100" r="2" class="dot"/>
  <circle cx="740" cy="100" r="2" class="dot-dim"/>
  <circle cx="680" cy="120" r="2" class="dot-dim"/>
  <circle cx="700" cy="120" r="2" class="dot-dim"/>
  <circle cx="720" cy="120" r="2" class="dot-dim"/>
  <circle cx="740" cy="120" r="2" class="dot"/>

  <!-- Scanline effect -->
  <line x1="0" y1="20" x2="900" y2="20" class="scanline"/>

  <!-- Tag line (top left) -->
  <text x="60" y="28" class="tag">// CREATIVE.DIRECTOR</text>

  <!-- Main name -->
  <text x="60" y="115" class="name">OMKAR MISHRA</text>

  <!-- Cursor after name -->
  <rect x="470" y="89" width="4" height="30" class="cursor" rx="1"/>

  <!-- Accent underline with shimmer -->
  <line x1="60" y1="125" x2="360" y2="125" stroke-dasharray="300" class="shimmer-line"/>

  <!-- Role text -->
  <text x="62" y="152" class="role">Motion Designer · Zero Sleep Studio</text>

  <!-- Pulse dot + status -->
  <circle cx="62" cy="178" r="3" class="pulse"/>
  <text x="74" y="182" class="tag">Available for collabs</text>

  <!-- Right side: stats decoration -->
  <text x="820" y="105" class="tag" text-anchor="middle">4+</text>
  <text x="820" y="120" font-family="Space Mono, monospace" font-size="9" fill="#3d4f6b" text-anchor="middle" letter-spacing="1">YEARS</text>

  <text x="820" y="148" class="tag" text-anchor="middle">IN</text>
  <text x="820" y="163" font-family="Space Mono, monospace" font-size="9" fill="#3d4f6b" text-anchor="middle" letter-spacing="1">MOTION</text>
</svg>
